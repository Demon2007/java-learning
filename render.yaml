services:
  # Django Backend
  - type: web
    name: java-learning-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "java-learning-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://java-learning-frontend.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # React Frontend
  - type: web
    name: java-learning-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "https://java-learning-backend.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
